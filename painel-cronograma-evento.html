<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cronograma do Evento — Portal do Aluno</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: 255,255,255; --page-bg: #111113; }
  body {
    background: var(--page-bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: rgb(var(--ink));
    min-height: 100vh;
    padding-bottom: 4rem;
    position: relative;
    overflow-x: hidden;
    transition: background .2s, color .2s;
  }

  /* ─── MODO CLARO ─── */
  body.light-mode {
    --ink: 20,20,26;
    --page-bg: #f2f2f5;
  }
  body.light-mode::before,
  body.light-mode::after { opacity: .35; }

  body::before {
    content: '';
    position: fixed;
    top: -120px; left: -80px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(200,30,30,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: 0; right: -100px;
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(165,2,22,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .glass {
    background: linear-gradient(145deg, rgba(var(--ink),0.09) 0%, rgba(var(--ink),0.04) 50%, rgba(var(--ink),0.02) 100%);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(var(--ink),0.11);
    border-top-color: rgba(var(--ink),0.22);
    border-left-color: rgba(var(--ink),0.16);
    box-shadow: inset 0 1px 0 rgba(var(--ink),0.14), inset 0 -1px 0 rgba(0,0,0,0.2), 0 8px 32px rgba(0,0,0,0.4);
  }
  .glass-red {
    background: linear-gradient(145deg, rgba(165,2,22,0.22) 0%, rgba(165,2,22,0.10) 50%, rgba(140,10,10,0.06) 100%);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(220,60,60,0.22);
    border-top-color: rgba(255,100,100,0.32);
    box-shadow: inset 0 1px 0 rgba(255,120,120,0.18), inset 0 -1px 0 rgba(100,0,0,0.3), 0 12px 40px rgba(165,2,22,0.25), 0 4px 16px rgba(0,0,0,0.5);
  }
  /* group-colored glass variant: relies on --grp custom property from .grp-A/B/C/D */
  .glass-tinted {
    background: linear-gradient(145deg, rgba(var(--grp,245,22,39),0.22) 0%, rgba(var(--grp,245,22,39),0.10) 50%, rgba(var(--grp,140,10,10),0.06) 100%);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(var(--grp,220,60,60),0.24);
    border-top-color: rgba(var(--grp,255,100,100),0.34);
    box-shadow: inset 0 1px 0 rgba(var(--grp,255,120,120),0.18), inset 0 -1px 0 rgba(0,0,0,0.25), 0 12px 40px rgba(var(--grp,165,2,22),0.22), 0 4px 16px rgba(0,0,0,0.5);
  }

  /* ─── GROUP COLORS ─── */
  .grp-A { --grp: 245,22,39; }   /* vermelho */
  .grp-B { --grp: 59,130,246; }  /* azul */
  .grp-C { --grp: 34,197,94; }   /* verde */
  .grp-D { --grp: 250,204,21; }  /* amarelo */

  /* ─── NAV ─── */
  .glass-nav {
    background: linear-gradient(180deg, rgba(20,20,22,0.92) 0%, rgba(14,14,16,0.80) 100%);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border-bottom: 1px solid rgba(var(--ink),0.08);
    box-shadow: 0 1px 0 rgba(var(--ink),0.05), 0 4px 24px rgba(0,0,0,0.4);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 2rem;
    height: 58px;
    display: flex;
    align-items: center;
    gap: 2rem;
  }
  body.light-mode .glass-nav {
    background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(245,245,248,0.85) 100%);
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 4px 24px rgba(0,0,0,0.06);
  }
  .nav-logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 15px; letter-spacing: -0.02em; }
  .nav-logo .dot { width: 8px; height: 8px; border-radius: 50%; background: #F51627; box-shadow: 0 0 10px rgba(245,22,39,0.8); }
  .nav-crumb { font-size: 12px; color: rgba(var(--ink),0.4); margin-left: auto; }

  /* ─── THEME TOGGLE ─── */
  .theme-toggle-btn {
    display: flex; align-items: center; gap: 7px;
    font-family: inherit; font-size: 12px; font-weight: 800;
    padding: 7px 14px; border-radius: 999px; cursor: pointer;
    border: 1px solid rgba(var(--ink),0.14);
    background: rgba(var(--ink),0.05);
    color: rgba(var(--ink),0.75);
    transition: all .15s;
  }
  .theme-toggle-btn:hover { background: rgba(var(--ink),0.1); }
  .theme-toggle-btn i { font-size: 14px; }

  .wrap { max-width: 980px; margin: 0 auto; padding: 2.2rem 1.5rem 0; position: relative; z-index: 1; }

  .page-head { margin-bottom: 1.8rem; }
  .eyebrow { display:flex; align-items:center; gap:8px; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#ff8a8a; margin-bottom: 8px; }
  .eyebrow .dot { width:6px; height:6px; border-radius:50%; background:#F51627; box-shadow:0 0 8px rgba(245,22,39,.9); }
  h1 { font-size: clamp(24px, 4vw, 34px); font-weight: 900; letter-spacing: -0.03em; }
  .page-sub { color: rgba(var(--ink),0.45); font-size: 14px; margin-top: 6px; }

  /* ─── MODE TOGGLE ─── */
  .mode-toggle { display: inline-flex; gap: 4px; padding: 4px; border-radius: 14px; background: rgba(var(--ink),0.04); border: 1px solid rgba(var(--ink),0.08); margin-bottom: 1.4rem; }
  .mode-btn {
    font-family: inherit; font-size: 12px; font-weight: 800; letter-spacing: .03em;
    padding: 9px 18px; border-radius: 10px; border: none; cursor: pointer;
    background: transparent; color: rgba(var(--ink),0.45);
    transition: all .15s;
  }
  .mode-btn:hover { color: rgba(var(--ink),0.8); }
  .mode-btn.active { background: linear-gradient(145deg, #F51627, #A50216); color: #fff; box-shadow: 0 4px 14px rgba(165,2,22,0.4); }

  /* ─── DAY SELECTOR ─── */
  .day-selector { display: flex; gap: 10px; margin-bottom: 1.6rem; flex-wrap: wrap; }
  .day-btn {
    flex: 1; min-width: 150px;
    border-radius: 16px; padding: 14px 18px; cursor: pointer;
    border: 1px solid rgba(var(--ink),0.10); background: rgba(var(--ink),0.03);
    transition: all .18s; text-align: left;
  }
  .day-btn:hover { background: rgba(var(--ink),0.06); border-color: rgba(var(--ink),0.2); }
  .day-btn.active {
    background: linear-gradient(145deg, rgba(245,22,39,0.28) 0%, rgba(165,2,22,0.14) 100%);
    border-color: rgba(245,60,60,0.5);
    box-shadow: 0 8px 24px rgba(165,2,22,0.3);
  }
  .day-btn-title { font-size: 16px; font-weight: 900; letter-spacing: -0.01em; }
  .day-btn-date { font-size: 11px; color: rgba(var(--ink),0.4); font-weight: 600; margin-top: 2px; }
  .day-btn.active .day-btn-date { color: rgba(255,180,180,0.8); }

  /* ─── DAY VIEW GRID ─── */
  .day-view-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items: start; }
  .day-view-col { border-radius: 18px; padding: 16px 14px 6px; }
  .day-view-col-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .day-view-col-title { font-size: 15px; font-weight: 900; color: rgb(var(--grp,255,255,255)); }
  .day-view-col .item { flex-direction: column; gap: 4px; padding: 11px 12px; }
  .day-view-col .item-time { width: auto; font-size: 11px; }
  .day-view-col .item-title { font-size: 12px; }
  .day-view-col .sub-time { width: 76px; font-size: 10px; }
  .day-view-col .sub-label { font-size: 11px; }
  @media (max-width: 900px) {
    .day-view-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 560px) {
    .day-view-grid { grid-template-columns: 1fr; }
  }

  /* ─── GROUP SELECTOR ─── */
  .group-selector { display: flex; gap: 10px; margin-bottom: 1.6rem; flex-wrap: wrap; }
  .group-btn {
    flex: 1; min-width: 130px;
    border-radius: 16px;
    padding: 16px 18px;
    cursor: pointer;
    border: 1px solid rgba(var(--ink),0.10);
    background: rgba(var(--ink),0.03);
    transition: all .18s;
    text-align: left;
  }
  .group-btn:hover { background: rgba(var(--ink),0.06); border-color: rgba(var(--ink),0.2); }
  .group-btn.active {
    background: linear-gradient(145deg, rgba(var(--grp,245,22,39),0.28) 0%, rgba(var(--grp,165,2,22),0.14) 100%);
    border-color: rgba(var(--grp,245,60,60),0.5);
    box-shadow: 0 8px 24px rgba(var(--grp,165,2,22),0.3);
  }
  .group-letter { font-size: 26px; font-weight: 900; letter-spacing: -0.02em; line-height: 1; color: rgb(var(--grp,255,255,255)); }
  .group-label { font-size: 11px; color: rgba(var(--ink),0.4); font-weight: 600; margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }
  .group-btn.active .group-label { color: rgba(var(--grp,255,180,180),0.85); }

  /* ─── LEGEND ─── */
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1.8rem; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: rgba(var(--ink),0.55); font-weight: 600; }
  .legend-swatch { width: 11px; height: 11px; border-radius: 4px; flex-shrink: 0; }
  .sw-workshop { background: #4d8dff; }
  .sw-simulado { background: #F51627; }
  .sw-livre { background: rgba(var(--ink),0.18); }
  .sw-almoco { background: #ffb445; }

  /* ─── DAY CARD ─── */
  .day-card { border-radius: 20px; padding: 22px 22px 8px; margin-bottom: 20px; }
  .day-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 6px; }
  .day-title { font-size: 19px; font-weight: 900; letter-spacing: -0.01em; }
  .day-date { font-size: 12px; color: rgba(var(--ink),0.4); font-weight: 600; }
  .day-blocks-tag { font-size: 11px; font-weight: 700; color: rgb(var(--grp,255,154,154)); background: rgba(var(--grp,245,22,39),0.14); border: 1px solid rgba(var(--grp,245,60,60),0.25); padding: 3px 10px; border-radius: 999px; }

  .timeline { display: flex; flex-direction: column; gap: 10px; padding-bottom: 14px; }
  .item {
    display: flex; gap: 14px;
    border-radius: 14px;
    padding: 14px 16px;
    border: 1px solid rgba(var(--ink),0.08);
    background: rgba(var(--ink),0.02);
  }
  /* tons do bloco: sempre a cor do grupo (--grp), variando claro/escuro por tipo — nunca outra cor */
  .item.workshop { border-left: 3px solid rgba(var(--grp),0.55); background: rgba(var(--grp),0.04); }
  .item.simulado { border-left: 3px solid rgb(var(--grp)); background: rgba(var(--grp),0.12); }
  .item.livre { border-left: 3px solid rgba(var(--grp),0.22); opacity: .55; }
  .item.almoco { border-left: 3px solid rgba(var(--grp),0.7); background: rgba(var(--grp),0.05); }

  .item-time { width: 108px; flex-shrink: 0; font-size: 13px; font-weight: 800; color: rgba(var(--ink),0.85); font-variant-numeric: tabular-nums; }
  .item-body { flex: 1; }
  .item-title { font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .item-title i { font-size: 15px; }
  .item.workshop .item-title { color: color-mix(in srgb, rgb(var(--grp)) 65%, white 35%); }
  .item.simulado .item-title { color: rgb(var(--grp)); }
  .item.almoco .item-title { color: color-mix(in srgb, rgb(var(--grp)) 70%, black 20%); }
  .item.livre .item-title { color: rgba(var(--grp),0.75); }
  .item-note { font-size: 12px; color: rgba(var(--ink),0.4); margin-top: 3px; }

  .sub-steps { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .sub-step { display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .sub-time { width: 96px; flex-shrink: 0; color: rgba(var(--ink),0.5); font-weight: 700; font-variant-numeric: tabular-nums; }
  .sub-label { color: rgba(var(--ink),0.75); font-weight: 600; }
  .sub-pill { font-size: 10px; font-weight: 800; padding: 2px 9px; border-radius: 999px; letter-spacing: .03em; }
  .pill-briefing { background: rgba(var(--grp),0.10); color: color-mix(in srgb, rgb(var(--grp)) 55%, white 35%); }
  .pill-bloco { background: rgba(var(--grp),0.24); color: rgb(var(--grp)); }
  .pill-debrief { background: rgba(var(--grp),0.14); color: color-mix(in srgb, rgb(var(--grp)) 65%, black 15%); }

  /* ─── VISÃO GERAL (todas as salas e grupos, ordem cronológica) ─── */
  .overview-section { margin-bottom: 24px; }
  .overview-lane-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
    color: rgba(var(--ink),0.45); margin-bottom: 10px;
  }
  .overview-lane-title i { font-size: 14px; }
  .item-group-badge {
    font-size: 10px; font-weight: 900; letter-spacing: .03em;
    padding: 2px 9px; border-radius: 999px;
    background: rgba(var(--grp),0.22); color: rgb(var(--grp));
    flex-shrink: 0;
  }

  @media (max-width: 620px) {
    .wrap { padding: 1.4rem 1rem 0; }
    .glass-nav { padding: 0 1.2rem; gap: 1rem; }
    .item { flex-direction: column; gap: 4px; }
    .item-time { width: auto; }
    .sub-time { width: 80px; }
  }
</style>
</head>
<body>

<nav class="glass-nav">
  <div class="nav-logo"><span class="dot"></span> Emergency Talks</div>
  <div class="nav-crumb">Portal do Aluno · Cronograma do Evento</div>
</nav>

<div class="wrap">

  <div class="page-head">
    <div class="eyebrow"><span class="dot"></span>24, 25 e 26 de Setembro</div>
    <h1>Cronograma do Evento</h1>
    <div class="page-sub" id="page-sub-text">Selecione seu grupo para ver sua programação completa nos 3 dias.</div>
  </div>

  <div class="mode-toggle" id="mode-toggle">
    <button class="mode-btn" onclick="selectMode('day', this)">Por Dia</button>
    <button class="mode-btn active" onclick="selectMode('group', this)">Por Grupo</button>
    <button class="mode-btn" onclick="selectMode('overview', this)">Visão Geral</button>
  </div>

  <div class="group-selector" id="group-selector"></div>
  <div class="day-selector" id="day-selector" style="display:none;"></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-swatch sw-workshop"></span> Workshop</div>
    <div class="legend-item"><span class="legend-swatch sw-simulado"></span> Simulado</div>
    <div class="legend-item"><span class="legend-swatch sw-almoco"></span> Almoço</div>
    <div class="legend-item"><span class="legend-swatch sw-livre"></span> Livre</div>
  </div>

  <div id="days-container"></div>

</div>

<script>
/* ── time helpers ── */
function toMin(hhmm) { const [h,m] = hhmm.split(':').map(Number); return h*60+m; }
function toHHMM(min) { const h = Math.floor(min/60), m = min%60; return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }
function addMin(hhmm, mins) { return toHHMM(toMin(hhmm)+mins); }
function range(hhmm, mins) { return `${hhmm}–${addMin(hhmm, mins)}`; }

const LUNCH = { time: '10:40–11:40', type: 'almoco', title: 'Almoço', icon: 'ti-coffee' };

function workshop(start) {
  return { time: range(start, 75), type: 'workshop', title: 'Workshop' };
}

/* simulado = 1 bloco só, tentado 2x (1ª tentativa -> debriefing -> 2ª tentativa, mesmo bloco) */
function simulado(start, bloco) {
  const t0 = start, t1 = addMin(start,5), t2 = addMin(start,30), t3 = addMin(start,55), t4 = addMin(start,80);
  return {
    time: `${t0}–${t4}`, type: 'simulado', title: `Simulado — Bloco ${bloco}`, bloco,
    sub: [
      { time: `${t0}–${t1}`, label: 'Briefing', pill: 'pill-briefing' },
      { time: `${t1}–${t2}`, label: `Bloco ${bloco} (1ª tentativa)`, pill: 'pill-bloco' },
      { time: `${t2}–${t3}`, label: 'Debriefing', pill: 'pill-debrief' },
      { time: `${t3}–${t4}`, label: `Bloco ${bloco} (2ª tentativa)`, pill: 'pill-bloco' },
    ]
  };
}

function livre(time, note) {
  return { time, type: 'livre', title: 'Livre', note };
}

const schedule = {
  A: [
    { day: 'Dia 1', date: '24/09', items: [
      workshop('08:00'),
      simulado('09:20', 1),
      LUNCH,
      livre('11:40–14:20', 'Grupos C e D em atividade — dia encerra às 14h20'),
    ]},
    { day: 'Dia 2', date: '25/09', items: [
      simulado('08:00', 2),
      livre('09:20–10:40', 'Grupo B na sala de Simulado'),
      LUNCH,
      livre('11:40–14:20', 'Grupos C e D na sala de Simulado'),
      simulado('14:20', 3),
      livre('15:40–17:00', 'Grupo B na sala de Simulado — dia encerra às 17h'),
    ]},
    { day: 'Dia 3', date: '26/09', items: [
      livre('08:00–10:40', 'Grupos C e D na sala de Simulado'),
      LUNCH,
      livre('11:40–14:20', 'Grupos C e D na sala de Simulado'),
      simulado('14:20', 4),
      livre('15:40–17:00', 'Grupo B na sala de Simulado — dia encerra às 17h'),
    ]},
  ],
  B: [
    { day: 'Dia 1', date: '24/09', items: [
      simulado('08:00', 1),
      workshop('09:20'),
      LUNCH,
      livre('11:40–14:20', 'Grupos C e D em atividade — dia encerra às 14h20'),
    ]},
    { day: 'Dia 2', date: '25/09', items: [
      livre('08:00–09:20', 'Grupo A na sala de Simulado'),
      simulado('09:20', 2),
      LUNCH,
      livre('11:40–14:20', 'Grupos C e D na sala de Simulado'),
      livre('14:20–15:40', 'Grupo A na sala de Simulado'),
      simulado('15:40', 3),
    ]},
    { day: 'Dia 3', date: '26/09', items: [
      livre('08:00–10:40', 'Grupos C e D na sala de Simulado'),
      LUNCH,
      livre('11:40–14:20', 'Grupos C e D na sala de Simulado'),
      livre('14:20–15:40', 'Grupo A na sala de Simulado'),
      simulado('15:40', 4),
    ]},
  ],
  C: [
    { day: 'Dia 1', date: '24/09', items: [
      livre('08:00–10:40', 'Grupos A e B em atividade'),
      LUNCH,
      workshop('11:40'),
      simulado('13:00', 1),
    ]},
    { day: 'Dia 2', date: '25/09', items: [
      livre('08:00–10:40', 'Grupos A e B na sala de Simulado'),
      LUNCH,
      simulado('11:40', 2),
      livre('13:00–17:00', 'Grupo D, depois A e B, na sala de Simulado — dia encerra às 17h'),
    ]},
    { day: 'Dia 3', date: '26/09', items: [
      simulado('08:00', 3),
      livre('09:20–10:40', 'Grupo D na sala de Simulado'),
      LUNCH,
      simulado('11:40', 4),
      livre('13:00–17:00', 'Grupo D, depois A e B, na sala de Simulado — dia encerra às 17h'),
    ]},
  ],
  D: [
    { day: 'Dia 1', date: '24/09', items: [
      livre('08:00–10:40', 'Grupos A e B em atividade'),
      LUNCH,
      simulado('11:40', 1),
      workshop('13:00'),
    ]},
    { day: 'Dia 2', date: '25/09', items: [
      livre('08:00–10:40', 'Grupos A e B na sala de Simulado'),
      LUNCH,
      livre('11:40–13:00', 'Grupo C na sala de Simulado'),
      simulado('13:00', 2),
      livre('14:20–17:00', 'Grupos A e B na sala de Simulado — dia encerra às 17h'),
    ]},
    { day: 'Dia 3', date: '26/09', items: [
      livre('08:00–09:20', 'Grupo C na sala de Simulado'),
      simulado('09:20', 3),
      LUNCH,
      livre('11:40–13:00', 'Grupo C na sala de Simulado'),
      simulado('13:00', 4),
      livre('14:20–17:00', 'Grupos A e B na sala de Simulado — dia encerra às 17h'),
    ]},
  ],
};

const ICONS = { workshop: 'ti-presentation', simulado: 'ti-stethoscope', almoco: 'ti-coffee', livre: 'ti-door-exit' };

let currentMode = 'group';
let currentGroup = 'A';
let currentDayIndex = 0;
const GROUPS = Object.keys(schedule);

function renderGroupSelector() {
  const el = document.getElementById('group-selector');
  el.innerHTML = GROUPS.map(g => `
    <button class="group-btn grp-${g} ${g === currentGroup ? 'active' : ''}" onclick="selectGroup('${g}')">
      <div class="group-letter">Grupo ${g}</div>
      <div class="group-label">Ver programação</div>
    </button>
  `).join('');
}

function renderDaySelector() {
  const el = document.getElementById('day-selector');
  el.innerHTML = schedule.A.map((day, i) => `
    <button class="day-btn ${i === currentDayIndex ? 'active' : ''}" onclick="selectDay(${i})">
      <div class="day-btn-title">${day.day}</div>
      <div class="day-btn-date">${day.date}</div>
    </button>
  `).join('');
}

function dayBlocksTag(day) {
  const blocos = day.items.filter(i => i.type === 'simulado').map(i => i.bloco);
  if (!blocos.length) return 'Sem Simulado';
  return blocos.length > 1 ? `Blocos ${blocos.join(' e ')}` : `Bloco ${blocos[0]}`;
}

function renderDays() {
  const el = document.getElementById('days-container');
  el.innerHTML = schedule[currentGroup].map(day => `
    <div class="day-card glass-tinted grp-${currentGroup}">
      <div class="day-head">
        <div>
          <span class="day-title">${day.day}</span>
          <span class="day-date"> · ${day.date}</span>
        </div>
        <div class="day-blocks-tag">${dayBlocksTag(day)}</div>
      </div>
      <div class="timeline">
        ${day.items.map(renderItem).join('')}
      </div>
    </div>
  `).join('');
}

function renderDayView() {
  const el = document.getElementById('days-container');
  const refDay = schedule.A[currentDayIndex];
  el.innerHTML = `
    <div class="day-card glass" style="padding-bottom:22px;">
      <div class="day-head">
        <div>
          <span class="day-title">${refDay.day}</span>
          <span class="day-date"> · ${refDay.date}</span>
        </div>
      </div>
      <div class="day-view-grid">
        ${GROUPS.map(g => {
          const day = schedule[g][currentDayIndex];
          return `
            <div class="day-view-col glass-tinted grp-${g}">
              <div class="day-view-col-head">
                <div class="day-view-col-title">Grupo ${g}</div>
                <div class="day-blocks-tag">${dayBlocksTag(day)}</div>
              </div>
              <div class="timeline">
                ${day.items.map(renderItem).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

/* junta tudo (Workshop, Simulado, Almoço) de todos os grupos num único dia, em ordem cronológica por sala */
function getDayOverview(dayIndex) {
  const workshopEvents = [];
  const simuladoEvents = [];
  GROUPS.forEach(g => {
    schedule[g][dayIndex].items.forEach(item => {
      if (item.type === 'workshop') workshopEvents.push({ ...item, group: g });
      if (item.type === 'simulado') simuladoEvents.push({ ...item, group: g });
    });
  });
  const byStart = (a, b) => toMin(a.time.split('–')[0]) - toMin(b.time.split('–')[0]);
  workshopEvents.sort(byStart);
  simuladoEvents.sort(byStart);
  return { workshopEvents, simuladoEvents };
}

function renderDayOverview() {
  const el = document.getElementById('days-container');
  const refDay = schedule.A[currentDayIndex];
  const { workshopEvents, simuladoEvents } = getDayOverview(currentDayIndex);
  const workshopLane = workshopEvents.length
    ? `<div class="overview-section">
        <div class="overview-lane-title"><i class="ti ti-presentation"></i> Sala Workshop</div>
        <div class="timeline">${workshopEvents.map(ev => `<div class="grp-${ev.group}">${renderItem(ev, ev.group)}</div>`).join('')}</div>
      </div>`
    : '';
  const simuladoLane = `<div class="overview-section">
      <div class="overview-lane-title"><i class="ti ti-stethoscope"></i> Sala Simulado</div>
      <div class="timeline">${simuladoEvents.map(ev => `<div class="grp-${ev.group}">${renderItem(ev, ev.group)}</div>`).join('')}</div>
    </div>`;
  const lunchLane = `<div class="overview-section">
      <div class="overview-lane-title"><i class="ti ti-coffee"></i> Almoço — todos os grupos</div>
      <div class="timeline">${renderItem(LUNCH)}</div>
    </div>`;

  el.innerHTML = `
    <div class="day-card glass">
      <div class="day-head">
        <div>
          <span class="day-title">${refDay.day}</span>
          <span class="day-date"> · ${refDay.date} — visão geral de tudo</span>
        </div>
      </div>
      ${workshopLane}
      ${simuladoLane}
      ${lunchLane}
    </div>
  `;
}

function renderContent() {
  if (currentMode === 'group') {
    renderDays();
  } else if (currentMode === 'day') {
    renderDayView();
  } else {
    renderDayOverview();
  }
}

function renderItem(item, groupBadge) {
  const icon = ICONS[item.type] || 'ti-clock';
  const badge = groupBadge ? `<span class="item-group-badge">Grupo ${groupBadge}</span>` : '';
  const sub = item.sub ? `<div class="sub-steps">${item.sub.map(s => `
    <div class="sub-step">
      <span class="sub-time">${s.time}</span>
      <span class="sub-pill ${s.pill}">${s.label}</span>
    </div>`).join('')}</div>` : '';
  const note = item.note ? `<div class="item-note">${item.note}</div>` : '';
  return `
    <div class="item ${item.type}">
      <div class="item-time">${item.time}</div>
      <div class="item-body">
        <div class="item-title">${badge}<i class="ti ${icon}"></i>${item.title}</div>
        ${note}
        ${sub}
      </div>
    </div>
  `;
}

function selectGroup(g) {
  currentGroup = g;
  renderGroupSelector();
  renderContent();
}

function selectDay(i) {
  currentDayIndex = i;
  renderDaySelector();
  renderContent();
}

const PAGE_SUB = {
  group: 'Selecione seu grupo para ver sua programação completa nos 3 dias.',
  day: 'Selecione um dia para ver a programação de todos os grupos lado a lado.',
  overview: 'Selecione um dia para ver o cronograma completo, com todas as salas e grupos juntos.',
};

function selectMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('group-selector').style.display = mode === 'group' ? 'flex' : 'none';
  document.getElementById('day-selector').style.display = (mode === 'day' || mode === 'overview') ? 'flex' : 'none';
  document.getElementById('page-sub-text').textContent = PAGE_SUB[mode];
  renderContent();
}

renderGroupSelector();
renderDaySelector();
renderContent();
</script>

</body>
</html>
